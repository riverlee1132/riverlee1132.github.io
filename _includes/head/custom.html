<!-- ① 테마 초기화 — FOUC 방지 (렌더 전 즉시 실행) -->
<script>
(function () {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme',
    saved ? saved : (prefersDark ? 'dark' : 'light')
  );
})();
</script>

<!-- ② Pretendard Variable Font — 비동기 로딩 (렌더 블로킹 방지) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
</noscript>

<!-- ③ theme-color 메타 -->
<meta name="theme-color" content="#534AB7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f0f0f"  media="(prefers-color-scheme: dark)">

<!-- ④ 다크모드 토글 버튼 주입 + 이미지 Lazy Loading -->
<script>
(function () {
  /* ── 아이콘 SVG (Feather Icons 스타일) ── */
  var SUN = '<svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
    + '<circle cx="12" cy="12" r="5"/>'
    + '<line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>'
    + '<line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>'
    + '<line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>'
    + '<line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>'
    + '</svg>';

  var MOON = '<svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">'
    + '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
    + '</svg>';

  /* ── 테마 설정 ── */
  function getTheme() {
    return document.documentElement.getAttribute('data-theme') || 'light';
  }

  function setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.setAttribute('aria-label', theme === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
    }
  }

  /* ── 버튼 주입 ── */
  function injectToggle() {
    if (document.getElementById('theme-toggle')) return;
    var nav = document.querySelector('.greedy-nav');
    if (!nav) return;

    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.setAttribute('aria-label', getTheme() === 'dark' ? '라이트 모드로 전환' : '다크 모드로 전환');
    btn.innerHTML = SUN + MOON;
    btn.addEventListener('click', function () {
      setTheme(getTheme() === 'dark' ? 'light' : 'dark');
    });

    nav.appendChild(btn);
  }

  /* ── 이미지 Lazy Loading ── */
  function applyLazyLoad() {
    var imgs = document.querySelectorAll('img:not([loading])');
    if ('loading' in HTMLImageElement.prototype) {
      imgs.forEach(function (img) { img.setAttribute('loading', 'lazy'); });
    } else if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            var img = e.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
            }
            io.unobserve(img);
          }
        });
      }, { rootMargin: '200px 0px' });
      imgs.forEach(function (img) { io.observe(img); });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      injectToggle();
      applyLazyLoad();
    });
  } else {
    injectToggle();
    applyLazyLoad();
  }
})();
</script>
