<!-- ① 테마 초기화 — FOUC 방지 (렌더 전 즉시 실행) -->
<script>
(function () {
  var saved = localStorage.getItem('theme');
  var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  document.documentElement.setAttribute('data-theme',
    saved ? saved : (prefersDark ? 'dark' : 'light')
  );
})();
</script>

<!-- ② Pretendard Variable Font — 비동기 로딩 (렌더 블로킹 방지) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="preload"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'">
<noscript>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
</noscript>

<!-- ③ theme-color 메타 -->
<meta name="theme-color" content="#534AB7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0f0f0f"  media="(prefers-color-scheme: dark)">

<!-- ④ 이미지 Lazy Loading -->
<script>
(function () {
  function applyLazyLoad() {
    var imgs = document.querySelectorAll('img:not([loading])');
    if ('loading' in HTMLImageElement.prototype) {
      imgs.forEach(function (img) { img.setAttribute('loading', 'lazy'); });
    } else if ('IntersectionObserver' in window) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            var img = e.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
            }
            io.unobserve(img);
          }
        });
      }, { rootMargin: '200px 0px' });
      imgs.forEach(function (img) { io.observe(img); });
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyLazyLoad);
  } else {
    applyLazyLoad();
  }
})();
</script>
